<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ferretería Abraham</title>

<style>
body { font-family: Arial; margin: 0; background: #111; color: white; }
header { background: black; padding: 15px; text-align: center; color: orange; font-size: 24px; }

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #222;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

#carrito {
  position: fixed;
  top: 0;
  right: 0;
